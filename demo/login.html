<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 临港创新智算服务平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 暗色主题变量 - 默认（与主页面一致） */
        :root {
            --primary-blue: #00d4ff;
            --primary-purple: #7c3aed;
            
            --bg-dark: #0a0e17;
            --bg-card: rgba(15, 23, 42, 0.9);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-tertiary: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.06);
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-placeholder: rgba(255, 255, 255, 0.4);
            
            /* 渐变背景 */
            --gradient-bg-solid: linear-gradient(180deg, #0a0e17 0%, #0f172a 50%, #0a0e17 100%);
        }

        /* 亮色主题变量（与主页面一致） */
        html[data-theme="light"] {
            --primary-blue: #00d4ff;
            --primary-purple: #7c3aed;
            
            --bg-dark: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: rgba(30, 41, 59, 0.7);
            --text-tertiary: rgba(30, 41, 59, 0.5);
            --border-color: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
            --input-placeholder: #94a3b8;
            
            /* 渐变背景（与主页面一致） */
            --gradient-bg-solid: linear-gradient(180deg, #f8fafc 0%, #ffffff 50%, #f1f5f9 100%);
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-bg-solid);
            z-index: -1;
            transition: background 0.3s;
        }

        /* 装饰性背景元素（与主页面风格一致） */
        .bg-decorations::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 60%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 60px;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
            transition: background 0.3s, border-color 0.3s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #fff;
            box-shadow:
                0 0 50px rgba(0, 212, 255, 0.3),
                0 0 80px rgba(124, 58, 237, 0.2);
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, var(--text-primary), var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-tertiary);
            margin: 0;
        }

        #errorMessage {
            display: none;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            color: #ef4444;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: var(--input-bg);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .form-input::placeholder {
            color: var(--input-placeholder);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .demo-section {
            margin-top: 30px;
        }

        .demo-title {
            font-size: 13px;
            color: var(--text-tertiary);
            margin: 0 0 15px 0;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .demo-btn {
            padding: 14px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .demo-btn:hover {
            transform: translateY(-2px);
        }

        .demo-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            color: #fff;
        }

        .demo-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .demo-name {
            font-weight: 500;
            margin-bottom: 2px;
            font-size: 13px;
        }

        .demo-subtitle {
            font-size: 11px;
            opacity: 0.8;
        }

        /* 园区主题色（与主页面一致） */
        .park-cube .demo-icon {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        .park-cube {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(124, 58, 237, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .park-media .demo-icon {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }
        .park-media {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(217, 119, 6, 0.05));
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .park-ai .demo-icon {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .park-ai {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .park-unified .demo-icon {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }
        .park-unified {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(124, 58, 237, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .copyright {
            position: absolute;
            bottom: 30px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 12px;
            width: 100%;
            left: 0;
        }
    </style>
</head>
<body>
    <!-- 背景层 -->
    <div id="bgCanvas" class="bg-canvas"></div>
    <div class="bg-decorations"></div>

    <!-- 登录卡片 -->
    <div class="login-card">
        <!-- Logo -->
        <div class="logo-area">
            <div class="logo">
                <i class="fas fa-microchip"></i>
            </div>
            <h1 class="title">临港创新智算服务平台</h1>
            <p class="subtitle">LINGANG INTELLIGENT COMPUTING PLATFORM</p>
        </div>

        <!-- 错误提示 -->
        <div id="errorMessage"></div>

        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码">
            </div>
            <button type="submit" class="login-btn">
                登 录
            </button>
        </form>

        <!-- 预设账户 -->
        <div class="demo-section">
            <p class="demo-title">点击下方快速登录:</p>
            <div class="demo-grid">
                
                <button class="demo-btn park-cube" data-user="lingangmofang_demo" data-pass="demo123" data-park="lingangmofang">
                    <div class="demo-icon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <div class="demo-info">
                        <div class="demo-name">零界魔方OPC社区</div>
                        <div class="demo-subtitle">科创孵化 · 零成本创业</div>
                    </div>
                </button>
                
                <button class="demo-btn park-media" data-user="yingshi_demo" data-pass="demo123" data-park="yingshi">
                    <div class="demo-icon">
                        <i class="fas fa-tv"></i>
                    </div>
                    <div class="demo-info">
                        <div class="demo-name">东方明珠影视基地</div>
                        <div class="demo-subtitle">数字内容 · 影视渲染</div>
                    </div>
                </button>
                
                <button class="demo-btn park-ai" data-user="aiinnovation_demo" data-pass="demo123" data-park="aiinnovation">
                    <div class="demo-icon">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="demo-info">
                        <div class="demo-name">滴水湖AI创新港</div>
                        <div class="demo-subtitle">AI创新 · 智算赋能</div>
                    </div>
                </button>
                
                <button class="demo-btn park-unified" data-user="lingang_demo" data-pass="demo123" data-park="unified">
                    <div class="demo-icon">
                        <i class="fas fa-building-columns"></i>
                    </div>
                    <div class="demo-info">
                        <div class="demo-name">通用平台</div>
                        <div class="demo-subtitle">多园区 · 自由切换</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- 版权信息 -->
    <div class="copyright">
        &copy; 2024 临港创新智算服务平台 版权所有
    </div>

    <!-- 加载脚本 -->
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        // 主题同步函数
        function applyTheme(theme) {
            if (theme === 'light') {
                // 亮色主题
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                // 暗色主题（默认）
                document.documentElement.removeAttribute('data-theme');
            }
        }

        // 页面加载时应用主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
        });

        // 监听localStorage变化
        window.addEventListener('storage', function(e) {
            if (e.key === 'theme') {
                applyTheme(e.newValue);
            }
        });

        // 显示错误
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // 处理演示账户点击
        document.querySelectorAll('.demo-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const username = this.getAttribute('data-user');
                const password = this.getAttribute('data-pass');
                const parkId = this.getAttribute('data-park');
                
                if (username && password) {
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').value = password;
                    hideError();
                    
                    // 自动登录
                    setTimeout(() => {
                        if (typeof setCurrentUser === 'function' && typeof USER_ACCOUNTS === 'object') {
                            const user = USER_ACCOUNTS[username];
                            if (user) {
                                setCurrentUser(user);
                                window.location.href = 'home.html?park=' + parkId;
                            } else {
                                showError('登录失败：用户不存在');
                            }
                        }
                    }, 300);
                }
            });
        });

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            if (typeof USER_ACCOUNTS !== 'object') {
                showError('系统加载中，请稍后重试');
                return;
            }

            const user = USER_ACCOUNTS[username];

            if (!user || user.password !== password) {
                showError('用户名或密码错误');
                return;
            }

            // 登录成功
            if (typeof setCurrentUser === 'function') {
                setCurrentUser(user);
                window.location.href = 'home.html?park=' + user.parkId;
            } else {
                showError('系统错误');
            }
        });

        // 演示账户按钮悬停效果
        document.querySelectorAll('.demo-btn').forEach(btn => {
            btn.onmouseover = function() { 
                btn.style.transform = 'translateY(-2px)';
            };
            btn.onmouseout = function() { 
                btn.style.transform = 'translateY(0)';
            };
        });

        // 登录按钮悬停效果
        document.querySelector('#loginForm button').onmouseover = function() { this.style.transform = 'translateY(-2px)'; };
        document.querySelector('#loginForm button').onmouseout = function() { this.style.transform = 'translateY(0)'; };
    </script>
</body>
</html>
