***<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算力资源 - 临港创新智算服务平台</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!checkPageAuth()) {
                return;
            }
        });
    </script>
    <script src="script.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #2563eb;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        /* 供应商卡片样式 */
        .resource-section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        /* 供应商切换标签 */
        .supplier-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .supplier-tab {
            padding: 12px 28px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #64748b;
            font-size: 15px;
        }

        .supplier-tab:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .supplier-tab.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-color: transparent;
        }

        /* 供应商卡片 */
        .supplier-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
        }

        .supplier-card.hidden {
            display: none;
        }

        .supplier-info {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .supplier-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .supplier-name h3 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }

        .supplier-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .supplier-actions {
            display: flex;
            gap: 12px;
        }

        .supplier-contact-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .supplier-contact-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* 资源类别 */
        .supplier-resources {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .resource-type {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #f1f5f9;
        }

        .resource-type-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }

        .resource-type-icon {
            font-size: 22px;
        }

        .resource-type-title {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }

        /* 资源列表 */
        .resource-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .resource-item {
            background: white;
            border-radius: 8px;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .resource-item:hover {
            border-color: #3b82f6;
            background: #f0f9ff;
            transform: translateX(4px);
        }

        .resource-item-name {
            font-size: 15px;
            font-weight: 600;
            color: #334155;
        }

        .resource-item-price {
            font-size: 16px;
            font-weight: 700;
            color: #059669;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            padding: 6px 14px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* 联系信息弹窗 */
        .contact-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .contact-modal.active {
            display: flex;
        }

        .contact-modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .contact-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .contact-modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }

        .contact-modal-close {
            background: none;
            border: none;
            font-size: 32px;
            cursor: pointer;
            color: #64748b;
        }

        .contact-modal-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .contact-modal-item:last-child {
            border-bottom: none;
        }

        .contact-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
        }

        .contact-info-text {
            font-size: 15px;
            color: #475569;
        }

        @media (max-width: 1024px) {
            .supplier-resources {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .supplier-resources {
                grid-template-columns: 1fr;
            }

            .supplier-header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .supplier-header h3::before {
                display: block;
            }
        }
    </style>
</head>
<body onload="initParkPage()">
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <span id="siteTitle">临港创新智算服务平台</span>
            </div>
            <nav class="nav" id="mainNav">
                <a href="index.html" class="nav-item">首页</a>
                <a href="models.html" class="nav-item" data-feature="models">模型广场</a>
                <a href="resources.html" class="nav-item active" data-feature="resources">算力资源</a>
                <a href="agent.html" class="nav-item" data-feature="agent">OpenClaw</a>
                <a href="cross-border.html" class="nav-item" data-feature="cross-border">跨境专线</a>
                <a href="innovation.html" class="nav-item" data-feature="innovation">创新生态</a>
                <a href="dashboard.html" class="nav-item">控制台</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn-secondary" onclick="showLoginModal()">登录</button>
                <button class="btn-primary" onclick="showLoginModal()">注册</button>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <div class="user-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="user-name" id="userName">企业用户</div>
                <div class="user-dropdown">
                    <a href="dashboard.html"><i class="fas fa-user-circle"></i> 个人中心</a>
                    <a href="dashboard.html"><i class="fas fa-file-invoice-dollar"></i> 账单中心</a>
                    <a href="dashboard.html"><i class="fas fa-cog"></i> 平台管理</a>
                    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h1 class="page-title">算力资源</h1>
            <p class="page-subtitle">供应商资源池，批量采购优势惠及园区企业</p>

            <!-- 供应商资源 -->
            <div class="resource-content active" id="resources-suppliers">
                <h3 class="resource-section-title">供应商资源池</h3>
                <div id="supplierTabs" class="supplier-tabs">
                    <!-- 由 JavaScript 动态生成供应商标签 -->
                </div>
                <div id="supplierList" class="supplier-list">
                    <!-- 由 JavaScript 动态填充供应商卡片 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 联系信息弹窗 -->
    <div class="contact-modal" id="contactModal">
        <div class="contact-modal-content">
            <div class="contact-modal-header">
                <h4 class="contact-modal-title">联系供应商</h4>
                <button class="contact-modal-close" onclick="closeContactModal()">&times;</button>
            </div>
            <div id="contactModalBody"></div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 临港创新智算服务平台 版权所有</p>
            </div>
        </div>
    </footer>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>登录</h3>
                <button class="modal-close" onclick="closeModal('loginModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label>用户名/手机号</label>
                        <input type="text" id="loginUsername" placeholder="请输入用户名或手机号">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 悬浮聊天按钮 -->
    <button class="chat-float-btn" id="chatFloatBtn" onclick="toggleChat()">
        <i class="fas fa-comment-dots"></i>
    </button>

    <script src="script.js"></script>
    <script>
        function initParkPage() {
            const park = initPark();
            if (!park) return;
            document.title = park.name + ' - 优惠资源';
            document.getElementById('siteTitle').textContent = park.name;
            document.querySelectorAll('[data-feature]').forEach(item => {
                const feature = item.getAttribute('data-feature');
                if (park.features[feature] === false) item.style.display = 'none';
            });

            // 渲染供应商资源
            renderSuppliers();
        }

        function renderSuppliers() {
            const tabsContainer = document.getElementById('supplierTabs');
            const listContainer = document.getElementById('supplierList');
            if (!tabsContainer || !listContainer) return;

            if (!RESOURCE_SUPPLIERS || Object.keys(RESOURCE_SUPPLIERS).length === 0) {
                listContainer.innerHTML = '<p style="text-align:center;color:#666;padding:40px;">暂无供应商数据</p>';
                return;
            }

            const supplierIds = Object.keys(RESOURCE_SUPPLIERS);
            let currentSupplier = supplierIds[0];

            // 生成供应商标签页
            const tabsHtml = supplierIds.map((id, index) => {
                const supplier = RESOURCE_SUPPLIERS[id];
                return `
                    <button class="supplier-tab ${index === 0 ? 'active' : ''}" data-id="${id}" onclick="switchSupplier('${id}')">
                        ${supplier.name}
                    </button>
                `;
            }).join('');
            tabsContainer.innerHTML = tabsHtml;

            // 生成供应商卡片
            renderSupplierCard(currentSupplier);

            // 绑定标签页点击事件
            document.querySelectorAll('.supplier-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.supplier-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    switchSupplier(this.dataset.id);
                });
            });
        }

        function switchSupplier(supplierId) {
            renderSupplierCard(supplierId);
        }

        function renderSupplierCard(supplierId) {
            const container = document.getElementById('supplierList');
            if (!container) return;

            const supplier = RESOURCE_SUPPLIERS[supplierId];
            if (!supplier) return;

            const resourceTypesHtml = [
                { type: 'servers', label: '算力服务器', icon: '💻' },
                { type: '专线', label: '市内专线', icon: '🔗' },
                { type: '机柜', label: 'IDC机柜租赁', icon: '🏢' }
            ].map(({ type, label, icon }) => {
                const items = supplier.resources[type] || [];
                if (items.length === 0) return '';
                return `
                    <div class="resource-type">
                        <div class="resource-type-header">
                            <span class="resource-type-icon">${icon}</span>
                            <h4 class="resource-type-title">${label}</h4>
                        </div>
                        <div class="resource-list">
                            ${items.map(item => `
                                <div class="resource-item">
                                    <span class="resource-item-name">${item.name}</span>
                                    <span class="resource-item-price">¥${item.price}/月起</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');

            const cardHtml = `
                <div class="supplier-card" data-id="${supplierId}">
                    <div class="supplier-info">
                        <div class="supplier-name">
                            <div class="supplier-icon">
                                <i class="fas fa-building"></i>
                            </div>
                            <h3>${supplier.name}</h3>
                        </div>
                        <div class="supplier-actions">
                            <button class="supplier-contact-btn" onclick="showSupplierContact('${supplierId}')">
                                <i class="fas fa-phone"></i> 立即联系
                            </button>
                        </div>
                    </div>
                    <div class="supplier-resources">
                        ${resourceTypesHtml}
                    </div>
                </div>
            `;

            container.innerHTML = cardHtml;
        }

        function showSupplierContact(supplierId) {
            const supplier = RESOURCE_SUPPLIERS[supplierId];
            if (!supplier) return;

            const modal = document.getElementById('contactModal');
            const modalBody = document.getElementById('contactModalBody');

            if (!modal || !modalBody) return;

            const contactHtml = `
                <div class="contact-modal-item">
                    <div class="contact-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-info-text">
                        <strong>电话</strong><br>
                        ${supplier.contact.phone}
                    </div>
                </div>
                <div class="contact-modal-item">
                    <div class="contact-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-info-text">
                        <strong>邮箱</strong><br>
                        ${supplier.contact.email}
                    </div>
                </div>
                <div class="contact-modal-item">
                    <div class="contact-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-info-text">
                        <strong>地址</strong><br>
                        ${supplier.contact.address}
                    </div>
                </div>
            `;

            modalBody.innerHTML = contactHtml;
            modal.classList.add('active');

            // 点击弹窗背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeContactModal();
                }
            });
        }

        function closeContactModal() {
            const modal = document.getElementById('contactModal');
            if (modal) {
                modal.classList.remove('active');
            }
        }
    </script>
</body>
</html>
